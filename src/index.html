<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 Live Dashboard</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192-any.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563EB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WC2026">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wdth,wght@0,50..100,100..900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="app-header">
    <div class="brand">
      <div class="brand-icon">⚽</div>
      <div class="brand-name">WC2026 <small>Live Dashboard</small></div>
    </div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-view="dashboard">Dashboard</button>
      <button class="nav-tab" data-view="schedule">Schedule</button>
      <button class="nav-tab" data-view="standings">Standings</button>
      <button class="nav-tab" data-view="bracket">Bracket</button>
    </nav>
    <div class="header-right">
      <label class="toggle-wrap">
        <input type="checkbox" id="live-mode-toggle">
        <div class="toggle-track"><div class="toggle-knob"></div></div>
        Live Standings
      </label>
      <div class="sync-pill">
        <span class="sync-dot"></span>
        <span id="last-sync">Loading...</span>
      </div>
    </div>
  </header>
  <main id="app-main">
    <div id="view-dashboard" class="view active"></div>
    <div id="view-schedule" class="view"></div>
    <div id="view-standings" class="view"></div>
    <div id="view-bracket" class="view"></div>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
