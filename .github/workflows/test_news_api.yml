name: Probe ESPN News API

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Probe news endpoints
        run: node scripts/test_news_api.js

      - name: Commit probe results
        run: |
          git add blueprint_data/espn_news_probe
          git diff --staged --quiet || git commit -m "Add ESPN news API probe results"
          git push origin HEAD:${{ github.ref_name }}
