name: Snapshot Extra-Time Transitions

# Unattended forensic capture, separate from the main sync pipeline (see
# sync.yml). Polls the ESPN scoreboard every 5 minutes and, whenever a match
# looks like it's in or approaching extra time, saves the raw scoreboard +
# summary payloads to blueprint_data/et_snapshots/ so a future debugging
# session has real data to work from instead of needing to catch it live.
# See scripts/snapshot_extra_time.js for the trigger conditions.
on:
  # OFF-SEASON (as of 2026-07-19, WC2026 concluded): schedule trigger
  # disabled, no live match to snapshot. workflow_dispatch left so it can
  # still be run manually. See CLAUDE.md "Open Issues / Pre-Restart Checklist".
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Snapshot extra-time transitions
        run: node scripts/snapshot_extra_time.js

      - name: Commit any new snapshots
        run: |
          git add blueprint_data/et_snapshots
          git diff --staged --quiet && exit 0
          git commit -m "chore: capture extra-time transition snapshot [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git pull --rebase origin main
          git push
