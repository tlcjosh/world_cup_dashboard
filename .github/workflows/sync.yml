name: Sync World Cup Data

on:
  # OFF-SEASON (as of 2026-07-19, WC2026 concluded): schedule/push triggers
  # disabled so this stops polling ESPN and stops auto-deploying to
  # gh-pages. workflow_dispatch is left so it can still be run manually
  # (e.g. to test scripts/update_tracker.js against a future tournament).
  # See CLAUDE.md "Open Issues / Pre-Restart Checklist" for how to re-enable.
  # schedule:
  #   # GitHub minimum is */5. We loop inside the job every 30s to achieve
  #   # 30-second data freshness within each 5-minute cron window.
  #   - cron: '*/5 * * * *'
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Git identity must be configured before the script runs git commands
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Sync match data
        run: node scripts/update_tracker.js
        env:
          FD_API_TOKEN: ${{ secrets.FD_API_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: sync
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Pull the latest data.json committed by the sync loop
      - run: git pull origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          publish_branch: gh-pages
          force_orphan: false
