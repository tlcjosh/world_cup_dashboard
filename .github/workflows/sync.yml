name: Sync World Cup Data

on:
  schedule:
    # GitHub minimum is */5. We loop inside the job every 30s to achieve
    # 30-second data freshness within each 5-minute cron window.
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Git identity must be configured before the script runs git commands
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      # 10 iterations × 30s = 5 minutes. Uses 10 API calls/window (within quota).
      # update_tracker.js handles its own git commit+push only when data changes.
      - name: Sync match data (30s loop × 10)
        run: |
          for i in $(seq 1 10); do
            echo "--- Sync iteration $i/10 ---"
            node scripts/update_tracker.js || echo "Iteration $i encountered an error, continuing..."
            [ $i -lt 10 ] && sleep 30 || true
          done
        env:
          FD_API_TOKEN: ${{ secrets.FD_API_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: sync
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Pull the latest data.json committed by the sync loop
      - run: git pull origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          publish_branch: gh-pages
          force_orphan: false
